events {}

http {
  client_max_body_size 0;
  
  upstream strapi {
    server strapi:1337;
  }

  upstream app {
    server app:3000;
  }

  server {
    listen 80;

    location ~ ^/(admin|api|upload|plugins|content-manager|content-type-builder|users-permissions|i18n|email) {
      proxy_pass http://strapi;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
