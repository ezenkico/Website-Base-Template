version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: strapi
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin # Replace with a secure password
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      base:

  app:
    image: node:20
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: sh -c "npm install --force && npm run dev"
    depends_on:
      - strapi
    networks:
      base:

  strapi:
    image: node:20
    volumes:
      - ./strapi:/app
    ports:
      - "1337:1337"
      - "5173:5173"
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    depends_on:
      - postgres
    networks:
      base:

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
      - strapi
    networks:
      base:

networks:
  base:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
